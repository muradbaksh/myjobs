{% extends 'base.html' %}

{% block content %}

<h2>Register</h2>

<form id="registerForm">

    <input type="text"
           name="full_name"
           placeholder="Full Name">

    <input type="email"
           name="email"
           placeholder="Email">

    <input type="text"
           name="username"
           placeholder="Username">

    <input type="password"
           name="password"
           placeholder="Password">

    <button type="submit">
        Register
    </button>

</form>

<script src="/static/js/api.js"></script>
<script src="/static/js/auth.js"></script>

<style>


       /* =========================
REGISTER PAGE PREMIUM UI
========================= */

h2{
    text-align:center;
    font-size:34px;
    font-weight:900;
    letter-spacing:-0.5px;
    margin-top:40px;
    margin-bottom:20px;
    text-transform:capitalize;
}

/* FORM CARD */
#registerForm{
    max-width:460px;
    margin:40px auto;
    padding:28px;

    background:var(--glass);
    border:1px solid var(--border);
    border-radius:22px;

    backdrop-filter:blur(20px);
    box-shadow:0 20px 60px rgba(15,23,42,.08);

    display:flex;
    flex-direction:column;
    gap:14px;
}

/* INPUTS */
#registerForm input{
    padding:14px 16px;
    border-radius:14px;
    border:1px solid var(--border);
    font-size:15px;

    background:#fff;
    transition:.25s;
}

#registerForm input:focus{
    outline:none;
    border-color:var(--primary);
    box-shadow:0 0 0 4px rgba(37,99,235,.12);
}

/* BUTTON */
#registerForm button{
    margin-top:10px;
    padding:14px 16px;

    border:none;
    border-radius:14px;

    background:linear-gradient(135deg,var(--primary),var(--primary-light));
    color:#fff;

    font-weight:800;
    cursor:pointer;

    transition:.25s;
}

#registerForm button:hover{
    transform:translateY(-2px);
    box-shadow:0 18px 40px rgba(37,99,235,.25);
}

/* OPTIONAL MICRO UX IMPROVEMENT */
#registerForm input::placeholder{
    color:#94a3b8;
}

/* RESPONSIVE */
@media(max-width:500px){
    #registerForm{
        margin:20px;
        padding:22px;
    }

    h2{
        font-size:28px;
    }
}


</style>
{% endblock %}
