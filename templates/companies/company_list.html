{% extends 'base.html' %}

{% block content %}

<section class="page-header">
    <h2>Top Companies</h2>
</section>

<section class="filters">

    <input type="text" id="searchInput" placeholder="Search companies">

    <select id="industryFilter">
        <option value="">All Industry</option>
        <option value="software">Software</option>
        <option value="banking">Banking</option>
        <option value="telecom">Telecom</option>
        <option value="healthcare">Healthcare</option>
        <option value="ecommerce">E-Commerce</option>
    </select>

    <select id="typeFilter">
        <option value="">All Types</option>
        <option value="local">Local</option>
        <option value="mnc">MNC</option>
        <option value="startup">Startup</option>
    </select>

    <button id="searchBtn">Search</button>

    <!-- Section Heading -->

    <div class="companies-section-header">

        <h2>
            Browse Companies
        </h2>

        <p>
            Find the right workplace using real employee insights.
        </p>

    </div>

    <!-- Companies Container -->

<section id="companiesContainer" class="company-grid">
</section>

    <!-- Pagination -->

    <div class="pagination">

        <button id="prevBtn">
            Previous
        </button>

        <span id="pageNumber">
            1
        </span>

        <button id="nextBtn">
            Next
        </button>

    </div>

</section>

<script src="/static/js/api.js"></script>
<script src="/static/js/companies.js"></script>



<style>

/* =========================
COMPANIES PAGE PREMIUM UPGRADE
========================= */

/* Smooth layout tuning */
.companies-page{
    max-width:1280px;
    margin:auto;
    padding:80px 24px 110px;
}

/* Header */
.companies-header{
    text-align:center;
    max-width:780px;
    margin:0 auto 70px;
}

.section-badge{
    display:inline-flex;
    align-items:center;
    padding:8px 16px;
    border-radius:999px;
    background:rgba(37,99,235,.08);
    border:1px solid rgba(37,99,235,.15);
    color:var(--primary);
    font-size:12px;
    font-weight:700;
    letter-spacing:.5px;
    margin-bottom:18px;
}

.companies-header h1{
    font-size:clamp(36px,5vw,64px);
    font-weight:900;
    letter-spacing:-1.5px;
    line-height:1.1;
    margin-bottom:16px;
}

.companies-header p{
    font-size:17px;
    line-height:1.7;
    color:var(--text-soft);
}

/* FILTER CARD */
.filters{
    display:flex;
    gap:16px;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;

    padding:18px;
    border-radius:20px;

    background:var(--glass);
    border:1px solid var(--border);

    backdrop-filter:blur(20px);
    box-shadow:0 18px 45px rgba(15,23,42,.06);

    margin-bottom:30px;
}

/* Search */
.search-wrapper{
    flex:1;
    display:flex;
    gap:12px;
}

#searchInput{
    flex:1;
    padding:14px 16px;
    border-radius:14px;
    border:1px solid var(--border);
    background:#fff;
    font-size:15px;
    transition:.25s;
}

#searchInput:focus{
    outline:none;
    border-color:var(--primary);
    box-shadow:0 0 0 4px rgba(37,99,235,.12);
}

#searchBtn{
    padding:14px 20px;
    border-radius:14px;
    border:none;
    cursor:pointer;

    background:linear-gradient(135deg,var(--primary),var(--primary-light));
    color:#fff;
    font-weight:700;

    transition:.25s;
}

#searchBtn:hover{
    transform:translateY(-2px);
    box-shadow:0 15px 30px rgba(37,99,235,.25);
}

/* Filters */
.filter-group{
    display:flex;
    gap:12px;
}

#industryFilter,
#typeFilter{
    padding:14px 16px;
    border-radius:14px;
    border:1px solid var(--border);
    background:#fff;
    min-width:170px;
    cursor:pointer;
    transition:.2s;
}

#industryFilter:focus,
#typeFilter:focus{
    outline:none;
    border-color:var(--primary);
}

/* STATS */
.directory-stats{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:18px;
    margin:50px 0;
}

.stat-item{
    background:rgba(255,255,255,.75);
    border:1px solid var(--border);
    border-radius:20px;
    padding:22px;
    text-align:center;
    transition:.25s;
    box-shadow:0 10px 25px rgba(15,23,42,.05);
}

.stat-item:hover{
    transform:translateY(-5px);
    box-shadow:0 20px 45px rgba(15,23,42,.10);
}

.stat-item strong{
    display:block;
    font-size:30px;
    font-weight:900;
    color:var(--primary);
    margin-bottom:6px;
}

.stat-item span{
    color:var(--text-soft);
}

/* SECTION TITLE */
.companies-section-header{
    text-align:center;
    margin-bottom:30px;
}

.companies-section-header h2{
    font-size:32px;
    font-weight:800;
    letter-spacing:-0.5px;
}

.companies-section-header p{
    color:var(--text-soft);
    margin-top:6px;
}

/* GRID */
.companies-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
    gap:20px;
    margin-bottom:50px;
}

/* COMPANY CARD */
.company-card{
    background:rgba(255,255,255,.82);
    border:1px solid var(--border);
    border-radius:24px;
    padding:20px;

    box-shadow:0 10px 25px rgba(15,23,42,.05);
    transition:.3s;
}

.company-card:hover{
    transform:translateY(-8px);
    border-color:rgba(37,99,235,.25);
    box-shadow:0 25px 60px rgba(15,23,42,.12);
}

/* PAGINATION */
.pagination{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:14px;
}

#prevBtn,#nextBtn{
    padding:12px 18px;
    border:none;
    border-radius:12px;
    background:var(--dark);
    color:#fff;
    cursor:pointer;
    transition:.25s;
    font-weight:600;
}

#prevBtn:hover,#nextBtn:hover{
    background:var(--dark-2);
    transform:translateY(-2px);
}

#pageNumber{
    font-weight:800;
    font-size:16px;
}

/* RESPONSIVE */
@media(max-width:900px){
    .directory-stats{
        grid-template-columns:1fr;
    }

    .filters{
        flex-direction:column;
        align-items:stretch;
    }

    .search-wrapper{
        flex-direction:column;
    }

    .filter-group{
        flex-direction:column;
    }

    #industryFilter,#typeFilter{
        width:100%;
    }
}

@media(max-width:600px){
    .companies-header h1{
        font-size:38px;
    }

    .companies-grid{
        grid-template-columns:1fr;
    }
}


</style>
{% endblock %}
